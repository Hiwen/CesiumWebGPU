const canvas=document.getElementById("c");
const W=canvas.width,H=canvas.height;

const gl=canvas.getContext("webgl2")||canvas.getContext("webgl")||canvas.getContext("experimental-webgl");
if(!gl){document.body.innerHTML="<p style=color:red>WebGL/WebGPU unavailable</p>";}

// Vertex shader — GlobeVS.wgsl equivalent
const VS=`
attribute vec3 aPos;attribute vec3 aNorm;attribute vec2 aUV;
uniform mat4 uMVP;uniform mat4 uMV;
varying vec3 vEC;varying vec3 vN;varying vec2 vUV;
void main(){
  gl_Position=uMVP*vec4(aPos,1.);
  vEC=(uMV*vec4(aPos,1.)).xyz;
  vN=normalize((uMV*vec4(aNorm,0.)).xyz);
  vUV=aUV;
}`;

// Fragment shader — GlobeFS.wgsl equivalent
const FS=`
precision highp float;
uniform sampler2D uTex;uniform vec3 uL;uniform float uT;
varying vec3 vEC;varying vec3 vN;varying vec2 vUV;

float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
float n2(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n2(p);p*=2.;a*=.5;}return v;}
float ss(float e0,float e1,float x){float t=clamp((x-e0)/(e1-e0),0.,1.);return t*t*(3.-2.*t);}

void main(){
  // Geographic surface (real continents)
  vec3 col=texture2D(uTex,vUV).rgb;

  // Cloud layer — fbm identical to GlobeFS.wgsl
  vec2 cuv=vUV+vec2(uT*.004,0.);
  float cloud=ss(.60,.68,fbm(cuv*vec2(5.0,8.0)));
  col=mix(col,vec3(.97,.98,1.),cloud*.60);

  // Diffuse lighting (soft: raised ambient so night side readable)
  vec3 N=normalize(vN),L=normalize(uL),V=normalize(-vEC);
  float ndl=clamp(dot(N,L),0.,1.);
  col*=(.15+ndl*.85);

  // Ocean specular (Blinn-Phong, water pixels only)
  vec3 raw=texture2D(uTex,vUV).rgb;
  float isWater=ss(0.,.09,raw.b-raw.r-.05);
  float spec=pow(clamp(dot(N,normalize(L+V)),0.,1.),65.)*isWater*.22;
  col+=vec3(1.,.97,.90)*spec;

  // Fresnel atmospheric rim
  col+=vec3(.08,.20,.68)*pow(1.-clamp(dot(N,V),0.,1.),3.2)*.48;

  // Night side: faint glow (simulates city lights concept)
  float night=1.-clamp(ndl*2.2+.35,0.,1.);
  col+=vec3(.003,.005,.018)*night;

  gl_FragColor=vec4(clamp(col,0.,1.),1.);
}`;

function mkS(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);
  if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(sh);return sh;}
const prog=gl.createProgram();
gl.attachShader(prog,mkS(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

// High-res UV sphere (80×160 segments)
const SL=80,SN=160,vd=[],id=[];
for(let i=0;i<=SL;i++){const th=i/SL*Math.PI,st=Math.sin(th),ct=Math.cos(th);
  for(let j=0;j<=SN;j++){const ph=j/SN*2*Math.PI,sp=Math.sin(ph),cp=Math.cos(ph),x=st*cp,y=ct,z=st*sp;
    vd.push(x,y,z,x,y,z,j/SN,i/SL);}}
for(let i=0;i<SL;i++)for(let j=0;j<SN;j++){
  const a=i*(SN+1)+j,b=a+SN+1;id.push(a,b,a+1,b,b+1,a+1);}
const va=new Float32Array(vd),ia=new Uint32Array(id);
const vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,va,gl.STATIC_DRAW);
const ibo=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ibo);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,ia,gl.STATIC_DRAW);
gl.getExtension("OES_element_index_uint");
const st=32,ap=gl.getAttribLocation(prog,"aPos"),an=gl.getAttribLocation(prog,"aNorm"),au=gl.getAttribLocation(prog,"aUV");
gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,st,0);
gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,st,12);
gl.enableVertexAttribArray(au);gl.vertexAttribPointer(au,2,gl.FLOAT,false,st,24);
const uMVP=gl.getUniformLocation(prog,"uMVP"),uMV=gl.getUniformLocation(prog,"uMV"),
      uL=gl.getUniformLocation(prog,"uL"),uT_u=gl.getUniformLocation(prog,"uT"),
      uTex=gl.getUniformLocation(prog,"uTex");

// Matrix helpers
const mul=(a,b)=>{const r=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++)for(let k=0;k<4;k++)r[j*4+i]+=a[k*4+i]*b[j*4+k];return r;};
const persp=(fv,asp,n,f)=>{const fd=1/Math.tan(fv/2),nf=1/(n-f),r=new Float32Array(16);
  r[0]=fd/asp;r[5]=fd;r[10]=(f+n)*nf;r[11]=-1;r[14]=2*f*n*nf;return r;};
const lookAt=(e,c,u)=>{
  let fx=c[0]-e[0],fy=c[1]-e[1],fz=c[2]-e[2],fl=Math.hypot(fx,fy,fz);fx/=fl;fy/=fl;fz/=fl;
  let rx=fy*u[2]-fz*u[1],ry=fz*u[0]-fx*u[2],rz=fx*u[1]-fy*u[0],rl=Math.hypot(rx,ry,rz);rx/=rl;ry/=rl;rz/=rl;
  const ox=ry*fz-rz*fy,oy=rz*fx-rx*fz,oz=rx*fy-ry*fx,r=new Float32Array(16);
  r[0]=rx;r[1]=ox;r[2]=-fx;r[4]=ry;r[5]=oy;r[6]=-fy;r[8]=rz;r[9]=oz;r[10]=-fz;
  r[12]=-(rx*e[0]+ry*e[1]+rz*e[2]);r[13]=-(ox*e[0]+oy*e[1]+oz*e[2]);
  r[14]=(fx*e[0]+fy*e[1]+fz*e[2]);r[15]=1;return r;};
const rotY=a=>{const c=Math.cos(a),s=Math.sin(a),r=new Float32Array(16);
  r[0]=c;r[2]=s;r[5]=1;r[8]=-s;r[10]=c;r[15]=1;return r;};

// Load geographic texture and start render loop
let earthTex=null;
const img=new Image();
img.onload=()=>{
  earthTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,earthTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img);
  gl.generateMipmap(gl.TEXTURE_2D);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.viewport(0,0,W,H);
  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.CULL_FACE);
  loop();
};
img.src=EARTH_B64;

// Draw background stars on a 2D overlay canvas
(function drawStars(){
  const oc=document.createElement("canvas");
  oc.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1";
  oc.width=window.innerWidth||1280;oc.height=window.innerHeight||720;
  const oc2=oc.getContext("2d");
  oc2.fillStyle="#000";oc2.fillRect(0,0,oc.width,oc.height);
  let rng=98765;const lcg=()=>{rng=(rng*1664525+1013904223)>>>0;return rng/0xffffffff;};
  for(let s=0;s<800;s++){
    const sx=lcg()*oc.width,sy=lcg()*oc.height,br=lcg();
    const sz=br<.04?1.4:br<.15?.8:.45;
    oc2.globalAlpha=.18+br*.82;
    oc2.fillStyle="#fff";oc2.beginPath();oc2.arc(sx,sy,sz,0,Math.PI*2);oc2.fill();
  }
  oc2.globalAlpha=1;
  document.body.insertBefore(oc,document.body.firstChild);
})();

const T0=performance.now();
function loop(){
  const t=(performance.now()-T0)/1e3;
  const ang=-0.28+t*0.045; // show Africa/Europe, slow rotation

  gl.clearColor(.002,.004,.010,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  if(!earthTex){requestAnimationFrame(loop);return;}

  const proj=persp(Math.PI/4.2,W/H,.1,100);
  const view=lookAt([0,.07,2.70],[0,0,0],[0,1,0]);
  const mod=rotY(ang);
  const mv=mul(view,mod),mvp=mul(proj,mv);

  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.uniformMatrix4fv(uMV,false,mv);

  // Sun: front-upper-right — maximises lit continent area
  const lx=.40,ly=.48,lz=.78,ll=Math.hypot(lx,ly,lz);
  gl.uniform3f(uL,lx/ll,ly/ll,lz/ll);
  gl.uniform1f(uT_u,t);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,earthTex);
  gl.uniform1i(uTex,0);
  gl.drawElements(gl.TRIANGLES,ia.length,gl.UNSIGNED_INT,0);

  requestAnimationFrame(loop);
}
