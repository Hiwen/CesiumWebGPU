const mul = (a,b) => {
  const r=new Float32Array(16);
  for(let i=0;i<4;i++)for(let j=0;j<4;j++)for(let k=0;k<4;k++)r[j*4+i]+=a[k*4+i]*b[j*4+k];

};
const persp=(fv,asp,n,f)=>{

  const ox=ry*fz-rz*fy,oy=rz*fx-rx*fz,oz=rx*fy-ry*fx,r=new Float32Array(16);
  r[0]=rx;r[1]=ox;r[2]=-fx;r[4]=ry;r[5]=oy;r[6]=-fy;r[8]=rz;r[9]=oz;r[10]=-fz;
  r[12]=-(rx*e[0]+ry*e[1]+rz*e[2]);r[13]=-(ox*e[0]+oy*e[1]+oz*e[2]);r[14]=(fx*e[0]+fy*e[1]+fz*e[2]);r[15]=1;return r;

function getCameraUniforms(t) {
  if(autoRotate)yaw=-0.28+t*0.045;
  const cPos=[zoom*Math.sin(yaw)*Math.cos(pitch),zoom*Math.sin(pitch),zoom*Math.cos(yaw)*Math.cos(pitch)];
  const proj=persp(Math.PI/4.2,W/H,0.1,100);
  const view=lookAt(cPos,[0,0,0],[0,1,0]);
  const mv=mul(view,ident()),mvp=mul(proj,mv);
  // Sun dir → eye space
  const ls=1/Math.hypot(.40,.48,.78),lx=.40*ls,ly=.48*ls,lz=.78*ls;
  const lex=view[0]*lx+view[4]*ly+view[8]*lz;
  const ley=view[1]*lx+view[5]*ly+view[9]*lz;
  const lez=view[2]*lx+view[6]*ly+view[10]*lz;
  return {mvp,mv,lightDirEC:[lex,ley,lez],t};
}

const GLOBE_VS=`
struct GlobeUniforms{mvp:mat4x4<f32>,mv:mat4x4<f32>,lightDirEC:vec3<f32>,time:f32}
@group(0)@binding(0)var<uniform>u:GlobeUniforms;
struct VI{@location(0)pos:vec3<f32>,@location(1)norm:vec3<f32>,@location(2)uv:vec2<f32>}
struct VO{@builtin(position)clip:vec4<f32>,@location(0)posEC:vec3<f32>,@location(1)normEC:vec3<f32>,@location(2)uv:vec2<f32>}
@vertex fn main(v:VI)->VO{var o:VO;
  o.clip=u.mvp*vec4<f32>(v.pos,1.0);
  o.posEC=(u.mv*vec4<f32>(v.pos,1.0)).xyz;
  o.normEC=normalize((u.mv*vec4<f32>(v.norm,0.0)).xyz);
  o.uv=v.uv;return o;}`;

const GLOBE_FS=`

@group(0)@binding(0)var<uniform>u:GlobeUniforms;
@group(1)@binding(0)var et:texture_2d<f32>;

struct FI{@builtin(position)clip:vec4<f32>,@location(0)posEC:vec3<f32>,@location(1)normEC:vec3<f32>,@location(2)uv:vec2<f32>}

  // Depth texture
  let depTex=device.createTexture({size:[W,H,1],format:"depth24plus",usage:GPUTextureUsage.RENDER_ATTACHMENT});
  let depView=depTex.createView();

  // Vertex buffer
  const vbo=device.createBuffer({size:va.byteLength,usage:GPUBufferUsage.VERTEX|GPUBufferUsage.COPY_DST,mappedAtCreation:true});
  new Float32Array(vbo.getMappedRange()).set(va);vbo.unmap();
  const ibo=device.createBuffer({size:ia.byteLength,usage:GPUBufferUsage.INDEX|GPUBufferUsage.COPY_DST,mappedAtCreation:true});
  new Uint32Array(ibo.getMappedRange()).set(ia);ibo.unmap();

  // Texture
  st.textContent="Uploading Earth texture to GPU…";
  const img=new Image();await new Promise((res,rej)=>{img.onload=res;img.onerror=(e)=>rej(new Error('Failed to load Earth imagery texture: '+e.type));img.src=EARTH_B64;});
  const bmp=await createImageBitmap(img);
  const eTex=device.createTexture({size:[bmp.width,bmp.height,1],format:"rgba8unorm",
    usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST|GPUTextureUsage.RENDER_ATTACHMENT});
  device.queue.copyExternalImageToTexture({source:bmp,flipY:false},{texture:eTex},[bmp.width,bmp.height]);
  const eSamp=device.createSampler({minFilter:"linear",magFilter:"linear",mipmapFilter:"linear",
    addressModeU:"repeat",addressModeV:"clamp-to-edge"});

  // Uniform buffer
  const ubuf=device.createBuffer({size:256,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});

  // Pipeline (GlobePassVS.wgsl + GlobePassFS.wgsl)
  st.textContent="Compiling WGSL shaders (GlobePassVS + GlobePassFS)…";
  const pip=await device.createRenderPipelineAsync({
    label:"GlobePassPipeline",layout:"auto",
    vertex:{module:device.createShaderModule({label:"GlobePassVS",code:GLOBE_VS}),entryPoint:"main",
      buffers:[{arrayStride:32,attributes:[{shaderLocation:0,offset:0,format:"float32x3"},
        {shaderLocation:1,offset:12,format:"float32x3"},{shaderLocation:2,offset:24,format:"float32x2"}]}]},
    fragment:{module:device.createShaderModule({label:"GlobePassFS",code:GLOBE_FS}),entryPoint:"main",
      targets:[{format:fmt,blend:{color:{srcFactor:"src-alpha",dstFactor:"one-minus-src-alpha"},alpha:{srcFactor:"one",dstFactor:"zero"}}}]},
    primitive:{topology:"triangle-list",cullMode:"back"},
    depthStencil:{format:"depth24plus",depthWriteEnabled:true,depthCompare:"less"},
  });

  // Bind groups
  const ubg=device.createBindGroup({layout:pip.getBindGroupLayout(0),
    entries:[{binding:0,resource:{buffer:ubuf,offset:0,size:256}}]});
  const tbg=device.createBindGroup({layout:pip.getBindGroupLayout(1),
    entries:[{binding:0,resource:eTex.createView()},{binding:1,resource:eSamp}]});

  badge.textContent="WebGPU"; badge.className="badge-webgpu";
  st.textContent="✓ WebGPU · GlobePassVS.wgsl + GlobePassFS.wgsl active";

  function frame(){
    const t=(performance.now()-t0)/1000;
    const {mvp,mv,lightDirEC}=getCameraUniforms(t);
    const ub=new Float32Array(64);
    ub.set(mvp,0);ub.set(mv,16);ub[32]=lightDirEC[0];ub[33]=lightDirEC[1];ub[34]=lightDirEC[2];ub[35]=t;
    device.queue.writeBuffer(ubuf,0,ub);
    const enc=device.createCommandEncoder();
    const pass=enc.beginRenderPass({
      colorAttachments:[{view:gpuCtx.getCurrentTexture().createView(),loadOp:"clear",
        clearValue:{r:.002,g:.005,b:.015,a:1},storeOp:"store"}],
      depthStencilAttachment:{view:depView,depthLoadOp:"clear",depthClearValue:1.0,depthStoreOp:"store"},
    });
    pass.setPipeline(pip);pass.setVertexBuffer(0,vbo);pass.setIndexBuffer(ibo,"uint32");
    pass.setBindGroup(0,ubg);pass.setBindGroup(1,tbg);pass.drawIndexed(ia.length);pass.end();
    device.queue.submit([enc.finish()]);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ═════════════════════════════════════════════════════════════════════════════
//  Path B: WebGL fallback (same GLSL shader logic as the WGSL shaders above)
// ═════════════════════════════════════════════════════════════════════════════
function runWebGL() {
  badge.textContent="WebGL (WebGPU unavailable)"; badge.className="badge-webgl";

  const gl=canvas.getContext("webgl2")||canvas.getContext("webgl")||canvas.getContext("experimental-webgl");
  if(!gl){st.textContent="Neither WebGPU nor WebGL is available.";return;}

  // GLSL equivalents of GlobePassVS.wgsl / GlobePassFS.wgsl
  const VS=`attribute vec3 aPos;attribute vec3 aNorm;attribute vec2 aUV;
  uniform mat4 uMVP;uniform mat4 uMV;
  varying vec3 vEC;varying vec3 vN;varying vec2 vUV;
  void main(){gl_Position=uMVP*vec4(aPos,1.);vEC=(uMV*vec4(aPos,1.)).xyz;vN=normalize((uMV*vec4(aNorm,0.)).xyz);vUV=aUV;}`;
  const FS=`precision highp float;
  uniform sampler2D uTex;uniform vec3 uL;uniform float uT;
  varying vec3 vEC;varying vec3 vN;varying vec2 vUV;
  float hsh(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
  float n2(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
    return mix(mix(hsh(i),hsh(i+vec2(1,0)),u.x),mix(hsh(i+vec2(0,1)),hsh(i+vec2(1,1)),u.x),u.y);}
  float fbm(vec2 q){float v=0.,a=.5;vec2 p=q;for(int i=0;i<5;i++){v+=a*n2(p);p*=2.;a*=.5;}return v;}
  float ss(float e0,float e1,float x){float t=clamp((x-e0)/(e1-e0),0.,1.);return t*t*(3.-2.*t);}
  void main(){
    vec3 tc=texture2D(uTex,vUV).rgb;
    vec3 raw=texture2D(uTex,vUV).rgb;
    vec3 col=tc;
    col=mix(col,vec3(.97,.98,1.),ss(.60,.68,fbm((vUV+vec2(uT*.004,0.))*vec2(5.,8.)))*.60);
    vec3 N=normalize(vN),L=normalize(uL),V=normalize(-vEC);
    float ndl=clamp(dot(N,L),0.,1.);col*=(.15+ndl*.85);
    float iw=ss(0.,.09,raw.b-raw.r-.05);
    col+=vec3(1.,.97,.90)*pow(clamp(dot(N,normalize(L+V)),0.,1.),65.)*iw*.22;
    col+=vec3(.08,.20,.68)*pow(1.-clamp(dot(N,V),0.,1.),3.2)*.48;
    col+=vec3(.003,.005,.018)*(1.-clamp(ndl*2.2+.35,0.,1.));
    gl_FragColor=vec4(clamp(col,0.,1.),1.);}`;

  function mkS(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);
    if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(sh);return sh;}
  const prog=gl.createProgram();
  gl.attachShader(prog,mkS(gl.VERTEX_SHADER,VS));gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(prog);gl.useProgram(prog);

  const vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,va,gl.STATIC_DRAW);
  const ibo=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ibo);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint32Array(id),gl.STATIC_DRAW);
  gl.getExtension("OES_element_index_uint");
  const st2=32,ap=gl.getAttribLocation(prog,"aPos"),an=gl.getAttribLocation(prog,"aNorm"),au=gl.getAttribLocation(prog,"aUV");
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,st2,0);
  gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,st2,12);
  gl.enableVertexAttribArray(au);gl.vertexAttribPointer(au,2,gl.FLOAT,false,st2,24);
  const uMVP=gl.getUniformLocation(prog,"uMVP"),uMV=gl.getUniformLocation(prog,"uMV"),
        uL=gl.getUniformLocation(prog,"uL"),uT_u=gl.getUniformLocation(prog,"uT"),
        uTex=gl.getUniformLocation(prog,"uTex");

  const img=new Image();
  img.onerror=(e)=>{console.error("Failed to load Earth imagery texture:",e.type);st.textContent="Error loading texture."};
  img.onload=()=>{
    const tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img);
    gl.generateMipmap(gl.TEXTURE_2D);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.viewport(0,0,W,H);gl.enable(gl.DEPTH_TEST);gl.enable(gl.CULL_FACE);
    st.textContent="WebGL active (same visual as WebGPU path)";

    function frame(){
      const t=(performance.now()-t0)/1000;
      const {mvp,mv,lightDirEC}=getCameraUniforms(t);
      gl.clearColor(.002,.005,.015,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
      gl.uniformMatrix4fv(uMVP,false,mvp);gl.uniformMatrix4fv(uMV,false,mv);
      gl.uniform3fv(uL,lightDirEC);gl.uniform1f(uT_u,t);
      gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);gl.uniform1i(uTex,0);
      gl.drawElements(gl.TRIANGLES,ia.length,gl.UNSIGNED_INT,0);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  };
  img.src=EARTH_B64;
}

// ── Entry: try WebGPU, fall back to WebGL ─────────────────────────────────────
if (navigator.gpu) {
  st.textContent = "Requesting WebGPU adapter…";
  runWebGPU().catch(err => {
    console.warn("[WebGPU] Failed, falling back to WebGL:", err.message);
    runWebGL();
  });
} else {
  runWebGL();
}
</script>
